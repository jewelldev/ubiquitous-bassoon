name: ADO Work Item to GitHub Issue

on:
  workflow_dispatch:
    inputs:
      work_item_id:
        description: 'ADO Work Item ID'
        required: true
        type: string
      work_item_title:
        description: 'Work item title'
        required: true
        type: string
      work_item_type:
        description: 'Work item type (e.g. User Story, Bug, Task)'
        required: false
        type: string
        default: 'Work Item'
      work_item_state:
        description: 'Work item state'
        required: false
        type: string
        default: ''
      work_item_description:
        description: 'Work item description (HTML or plain text)'
        required: false
        type: string
        default: ''
      work_item_url:
        description: 'ADO work item URL'
        required: false
        type: string
        default: ''
      work_item_tags:
        description: 'Semicolon-separated tags (e.g. "claude_implement; bug")'
        required: false
        type: string
        default: ''

jobs:
  create-github-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Verify claude_implement tag
        id: verify_tag
        run: |
          TAGS="${{ github.event.inputs.work_item_tags }}"
          if echo "$TAGS" | grep -qi "claude_implement"; then
            echo "Tag verified: claude_implement found in '$TAGS'"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping: 'claude_implement' tag not found in '$TAGS'"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for duplicate issue
        if: steps.verify_tag.outputs.proceed == 'true'
        id: check_duplicate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --search "[ADO #${{ github.event.inputs.work_item_id }}]" \
            --json number,title \
            --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already exists for ADO work item ${{ github.event.inputs.work_item_id }}"
            echo "issue_number=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "already_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub issue
        if: |
          steps.verify_tag.outputs.proceed == 'true' &&
          steps.check_duplicate.outputs.already_exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORK_ITEM_ID: ${{ github.event.inputs.work_item_id }}
          WORK_ITEM_TITLE: ${{ github.event.inputs.work_item_title }}
          WORK_ITEM_TYPE: ${{ github.event.inputs.work_item_type }}
          WORK_ITEM_STATE: ${{ github.event.inputs.work_item_state }}
          WORK_ITEM_DESCRIPTION: ${{ github.event.inputs.work_item_description }}
          WORK_ITEM_URL: ${{ github.event.inputs.work_item_url }}
        run: |
          cat > /tmp/issue_body.md << 'BODY_EOF'
          ## ADO Work Item Details

          | Field | Value |
          |-------|-------|
          | **ID** | #WORK_ITEM_ID_PLACEHOLDER |
          | **Type** | WORK_ITEM_TYPE_PLACEHOLDER |
          | **State** | WORK_ITEM_STATE_PLACEHOLDER |
          | **ADO Link** | [View in ADO](WORK_ITEM_URL_PLACEHOLDER) |

          ### Description

          WORK_ITEM_DESCRIPTION_PLACEHOLDER

          ---
          *Auto-created from Azure DevOps work item #WORK_ITEM_ID_PLACEHOLDER tagged with `claude_implement`*
          BODY_EOF

          # Substitute placeholders (avoids shell injection via env vars)
          sed -i \
            -e "s|WORK_ITEM_ID_PLACEHOLDER|${WORK_ITEM_ID}|g" \
            -e "s|WORK_ITEM_TYPE_PLACEHOLDER|${WORK_ITEM_TYPE}|g" \
            -e "s|WORK_ITEM_STATE_PLACEHOLDER|${WORK_ITEM_STATE}|g" \
            -e "s|WORK_ITEM_URL_PLACEHOLDER|${WORK_ITEM_URL}|g" \
            -e "s|WORK_ITEM_DESCRIPTION_PLACEHOLDER|${WORK_ITEM_DESCRIPTION}|g" \
            /tmp/issue_body.md

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "[ADO #${WORK_ITEM_ID}] ${WORK_ITEM_TITLE}" \
            --body-file /tmp/issue_body.md \
            --label "ado-sync"

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.verify_tag.outputs.proceed }}" != "true" ]; then
            echo "### Skipped — claude_implement tag not present" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.check_duplicate.outputs.already_exists }}" = "true" ]; then
            echo "### Skipped — issue #${{ steps.check_duplicate.outputs.issue_number }} already exists" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### GitHub issue created for ADO #${{ github.event.inputs.work_item_id }}" >> "$GITHUB_STEP_SUMMARY"
          fi

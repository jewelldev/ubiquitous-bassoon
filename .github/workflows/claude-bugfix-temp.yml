name: Claude Bug Fixer (temp - step 1)

on:
  repository_dispatch:
    types: [claude-fix]
  workflow_dispatch:
    inputs:
      workitem_id:
        description: 'ADO Work Item ID'
        required: true

jobs:
  fetch-workitem:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # ── Step 1: Fetch workitem from ADO and print what we got ───────────────
      - name: Fetch ADO workitem
        id: workitem
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG: ${{ secrets.ADO_ORG }}
          ADO_PROJECT: ${{ secrets.ADO_PROJECT }}
        run: |
          ID="${{ github.event.client_payload.workitem_id }}${{ inputs.workitem_id }}"

          RESPONSE=$(curl -sf \
            -u ":${ADO_PAT}" \
            "https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_apis/wit/workItems/${ID}?api-version=7.1")

          echo "=== Raw workitem fields ==="
          echo "$RESPONSE" | jq '.fields'

          echo ""
          echo "=== Parsed values ==="
          echo "Title:       $(echo "$RESPONSE" | jq -r '.fields["System.Title"]')"
          echo "State:       $(echo "$RESPONSE" | jq -r '.fields["System.State"]')"
          echo "Tags:        $(echo "$RESPONSE" | jq -r '.fields["System.Tags"] // "(none)"')"
          echo "Type:        $(echo "$RESPONSE" | jq -r '.fields["System.WorkItemType"]')"

          DESC=$(echo "$RESPONSE" \
            | jq -r '.fields["System.Description"] // .fields["Microsoft.VSTS.TCM.ReproSteps"] // "(no description)"' \
            | sed 's/<[^>]*>//g; s/&nbsp;/ /g; s/&amp;/\&/g')
          echo ""
          echo "Description:"
          echo "$DESC"

          # Save for Claude step
          echo "workitem_id=${ID}" >> $GITHUB_OUTPUT
          echo "title=$(echo "$RESPONSE" | jq -r '.fields["System.Title"]')" >> $GITHUB_OUTPUT
          {
            echo "description<<ENDDESC"
            echo "$DESC"
            echo "ENDDESC"
          } >> $GITHUB_OUTPUT

      # ── Step 2: Ask Claude to analyse the bug and explain its plan ──────────
      # Read-only — no file edits, no commits. Just shows Claude's reasoning.
      - name: Claude analysis (read-only)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: "true"
          claude_args: >-
            --allowedTools "Read,Glob,Grep,Bash(ls *),Bash(find *),Bash(cat *),Bash(dotnet build *)"
            --max-turns 10
          prompt: |
            You are reviewing a bug report to plan a fix. Do NOT edit any files or run git commands.

            ## Bug Report — ADO Work Item #${{ steps.workitem.outputs.workitem_id }}

            **Title:** ${{ steps.workitem.outputs.title }}

            **Description:**
            ${{ steps.workitem.outputs.description }}

            ---

            Please:
            1. Read CLAUDE.md to understand the project.
            2. Explore the codebase to find the code relevant to this bug.
            3. Explain in plain English:
               - Which file(s) are involved
               - What the likely root cause is
               - Exactly what change you would make to fix it
               - Whether a build-only verify is sufficient or if Playwright UI testing would be needed

      # ── Step 3: Extract Claude's output from the execution file ────────────
      - name: Extract Claude output
        id: extract
        if: always()
        run: |
          set +e  # never fail this step — we want to see what goes wrong

          OUTPUT_FILE="${{ steps.claude.outputs.execution_file }}"
          echo "execution_file output: '${OUTPUT_FILE}'"

          echo "--- ls _temp ---"
          ls -la "$RUNNER_TEMP/" 2>&1
          echo "exit: $?"

          if [ -z "$OUTPUT_FILE" ] || [ ! -f "$OUTPUT_FILE" ]; then
            echo "File not found or path empty — skipping"
            exit 0
          fi

          echo "--- raw file ---"
          cat "$OUTPUT_FILE"
          echo "cat exit: $?"

          echo "--- jq parse test ---"
          jq '.' "$OUTPUT_FILE" > /dev/null
          echo "jq exit: $?"

          echo "--- extract result field ---"
          ANALYSIS=$(jq -r '.result // ""' "$OUTPUT_FILE")
          echo "jq extract exit: $?"
          echo "analysis length: ${#ANALYSIS}"

          echo "--- write to GITHUB_OUTPUT ---"
          {
            echo "analysis<<ENDANALYSIS"
            printf '%s\n' "$ANALYSIS"
            echo "ENDANALYSIS"
          } >> "$GITHUB_OUTPUT"
          echo "write exit: $?"

      # ── Step 4: Write Claude's analysis to the job summary ─────────────────
      - name: Write analysis to job summary
        if: always()
        run: |
          {
            echo "## Claude Bug Analysis — ADO #${{ steps.workitem.outputs.workitem_id }}"
            echo ""
            echo "**${{ steps.workitem.outputs.title }}**"
            echo ""
            echo "${{ steps.extract.outputs.analysis }}"
          } >> $GITHUB_STEP_SUMMARY

      # ── Step 5: Post analysis as a comment on the ADO workitem ──────────────
      # Requires ADO_PAT to have Work Items — Read & Write scope.
      - name: Comment on ADO workitem
        if: steps.extract.outputs.analysis != ''
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG: ${{ secrets.ADO_ORG }}
          ADO_PROJECT: ${{ secrets.ADO_PROJECT }}
          CLAUDE_OUTPUT: ${{ steps.extract.outputs.analysis }}
        run: |
          ID="${{ steps.workitem.outputs.workitem_id }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Build comment body as HTML (ADO comments render HTML)
          BODY="<b>🤖 Claude Bug Analysis</b><br><br>${CLAUDE_OUTPUT//$'\n'/<br>}<br><br><i>Full analysis: <a href=\"${RUN_URL}\">GitHub Actions run</a></i>"

          # jq --arg safely escapes the text for JSON
          jq -n --arg text "$BODY" '{"text": $text}' > /tmp/comment.json

          curl -sf \
            -X POST \
            -u ":${ADO_PAT}" \
            -H "Content-Type: application/json" \
            -d @/tmp/comment.json \
            "https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_apis/wit/workItems/${ID}/comments?api-version=7.1-preview.3"

          echo "Comment posted to workitem ${ID}"
